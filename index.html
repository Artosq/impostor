<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostor Game v0.1🕵️‍♂️</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4757">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1 class="logo"><img src='logo4.png' width="300px"></h1>

    <div id="screen-login">
        <input type="text" id="input-name" placeholder="Twoje imię">
        <button class="btn-create" onclick="createRoom()">Stwórz Nowy Pokój</button>
        <div style="margin: 15px 0; color: #999;">— LUB —</div>
        <input type="text" id="input-code" placeholder="Kod pokoju">
        <button class="btn-join" onclick="joinRoom()">Dołącz do Pokoju</button>
        <div id="rooms-list"></div>
    </div>

    <div id="screen-lobby" class="hidden">
        <h3>Kod pokoju: <span id="room-code-display" style="color: var(--primary);">----</span></h3>
        <div id="players-list"></div>
        
        <div id="host-controls" class="hidden">
            <hr>
            <label>Kategoria:</label>
            <select id="select-category">
                <option value="Przedmioty">Przedmioty</option>
                <option value="Gry">Gry</option>
                <option value="Filmy">Filmy</option>
                <option value="Kraje">Kraje</option>
            </select>
            <label>Liczba Impostorów:</label>
            <select id="select-impostors">
                <option value="1">1 Impostor</option>
                <option value="2">2 Impostorów</option>
            </select>
            <button class="btn-start" onclick="startGame()">START GRY</button>
        </div>
        <p id="waiting-msg">Oczekiwanie na start przez hosta...</p>
    </div>

    <div id="screen-game" class="hidden">
        <div id="role-display">
            <p>Twoja rola:</p>
            <h2 id="role-name">---</h2>
            <hr>
            <p>Twoja informacja:</p>
            <h1 id="role-data">---</h1>
        </div>
        <div id="host-end-controls" class="hidden">
            <button class="btn-end" onclick="endGame()">ZAKOŃCZ I POKAŻ WYNIKI</button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let currentRoomCode = "";

    // Funkcje pomocnicze do przełączania ekranów
    function showScreen(screenId) {
        ['screen-login', 'screen-lobby', 'screen-game'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(screenId).classList.remove('hidden');
    }

    // KOMUNIKACJA Z SERWEREM
    function createRoom() {
        const name = document.getElementById('input-name').value;
        if (!name) return alert("Podaj imię!");
        socket.emit('create_room', { playerName: name });
    }

    function joinRoom(listCode) {
        let name = document.getElementById('input-name').value;

        let code = document.getElementById('input-code').value.toUpperCase();

        if (listCode && listCode !== "") {
        code = listCode;
        }

        //if (!name) return alert("Podaj imię i kod!");
        if(!name)name = "User" + Math.floor(1000 + Math.random()*9000)
        socket.emit('join_room', { playerName: name, roomCode: listCode });
    }

    function startGame() {
        const category = document.getElementById('select-category').value;
        const impostors = document.getElementById('select-impostors').value;
        socket.emit('start_game', { roomCode: currentRoomCode, category, impostorCount: parseInt(impostors) });
    }

    function endGame() {
        if(confirm("Zakończyć grę?")) socket.emit('end_game', currentRoomCode);
    }

    // OBSŁUGA ZDARZEŃ SOCKET.IO
    socket.on('room_created', (code) => {
        currentRoomCode = code;
        document.getElementById('room-code-display').innerText = code;
        showScreen('screen-lobby');
    });

    socket.on('room_update', (room) => {
        currentRoomCode = room.code; // upewnienie się dla dołączających
        document.getElementById('room-code-display').innerText = room.code;
        showScreen('screen-lobby');
        
        // Lista graczy
        const list = document.getElementById('players-list');
        list.innerHTML = room.players.map(p => `<span class="player-tag">${p.name}</span>`).join('');

        // Czy jesteś hostem?
        if (socket.id === room.host) {
            document.getElementById('host-controls').classList.remove('hidden');
            document.getElementById('waiting-msg').classList.add('hidden');
        }
    });

    socket.on('game_start', (data) => {
        showScreen('screen-game');
        const display = document.getElementById('role-display');
        display.className = data.role === 'IMPOSTOR' ? 'role-impostor' : 'role-citizen';
        document.getElementById('role-name').innerText = data.role;
        document.getElementById('role-data').innerText = data.data;

        // Pokazujemy przycisk końca tylko hostowi (możesz to sprawdzić po socket.id)
        socket.emit('check_host', currentRoomCode);
    });

    socket.on('is_host', (isHost) => {
        if(isHost) document.getElementById('host-end-controls').classList.remove('hidden');
    });

    socket.on('game_over', (results) => {
        alert(`KONIEC! \nImpostor: ${results.impostorNames.join(', ')} \nHasło: ${results.word}`);
        location.reload(); 
    });

    socket.on('room_list', (roomsObject) => {
    const listContainer = document.getElementById('rooms-list');
    
    // Zamieniamy obiekt pokojów na tablicę
    const roomsArray = Object.values(roomsObject);
    
    // Czyścimy listę i budujemy nową
    let html = "";
    
    if (roomsArray.length === 0) {
        html = "<p id='no-rooms'>Brak aktywnych pokojów. Stwórz własny!</p>";
    } else {
        roomsArray.forEach(room => {
            // Wyświetlamy tylko pokoje, które jeszcze czekają na graczy
            if (room.status === 'waiting') {
                html += `
                <div class="room-item">
                    <button onclick="joinRoom('${room.code}')">Dołącz do pokoju: ${room.code} ${room.players.length} graczy</button>
                </div>`;
            }
        });
    }
    
    listContainer.innerHTML = html;
    });

    socket.on('force_reload', (message) => {
    localStorage.removeItem('lastRoom'); // Czyścimy pamięć
    location.reload(); // Przeładowanie strony
    });

    socket.on('error', (msg) => alert(msg));
</script>
</body>
</html>
