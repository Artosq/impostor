<script>

    function saveNick(newNick) {
    localStorage.setItem('savedNick', newNick);
    }

    const socket = io();
    let currentRoomCode = "";

    function showRole(){
        document.getElementById('role-display').style.filter = "blur('0px')";

    // Funkcje pomocnicze do przełączania ekranów
    function showScreen(screenId) {
        ['screen-login', 'screen-lobby', 'screen-game','screen-vote','screen-load'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(screenId).classList.remove('hidden');

    // KOMUNIKACJA Z SERWEREM
    function createRoom() {
    let name = document.getElementById('input-name').value || randomNick();
    // Zapisujemy tylko imię, kod pokoju dopiszemy, gdy serwer go nam wyśle
    socket.emit('create_room', { playerName: name });
    }

    function joinRoom(listCode) {
    let name = document.getElementById('input-name').value || randomNick();
    let code = listCode || document.getElementById('input-code').value.toUpperCase();

    // Zapisujemy imię i kod
    //saveGameSession({ nickName: name, roomCode: code });
    socket.emit('join_room', { playerName: name, roomCode: code });
    }

    function castVote() {
        if(confirm("Zacząć głosowanie?")) socket.emit('cast_vote', currentRoomCode);
    }

    let selectedPlayers = [];

function voteOn(selectedTile, impostorCount) {
    // 1. Sprawdzamy, czy kafelek jest już zaznaczony
    const isSelected = selectedTile.classList.contains('selected');

    if (!isSelected) {
        // Dodawanie głosu - sprawdź limit
        if (selectedPlayers.length < impostorCount) {
            selectedTile.classList.add('selected');
            selectedPlayers.push(selectedTile);
        } else {
            console.log("Osiągnięto limit głosów!");
        }
    } else {
        // Usuwanie głosu
        selectedTile.classList.remove('selected');
        
        // Usuwamy ten konkretny element z tablicy
        selectedPlayers = selectedPlayers.filter(tile => tile !== selectedTile);
    }
}

    let category;
    function selectCategory(id){
        document.querySelectorAll('.category-tile').forEach(tile => {
            tile.classList.remove('selected')
        })
        category = id;
        document.getElementById(id).classList.add('selected');
    }
    selectCategory('Przedmioty');
    
    let impostors;
    function selectImpostors(id){
        document.querySelectorAll('.impostor-tile').forEach(tile => {
            tile.classList.remove('selected')
        })
        impostors = id;
        document.getElementById(id).classList.add('selected');
    }
    selectImpostors('1');

    function startGame() {
        socket.emit('start_game', { roomCode: currentRoomCode, category, impostorCount: parseInt(impostors) });
    }

    function endGame() {
        if(confirm("Zakończyć grę?")) socket.emit('end_game', currentRoomCode);
    }

    function randomNick(){
        const prefix = ['Crazy','Fat','Skinny','Zesty','Jewish','Stupid','Nasty','Slutty','Stupid','Dumb','Stinky','Cringe','Nigga','King','Tight','Clean','Edging']
        const rest = ['Nigger','Slut','Gay','Whore','Jew','Fucker','Hoe','Cunt','Killer','Pedo','Epstein','Putin','Faggot','Cock','Pussy','Balls','Dih','Puh']
        return prefix[Math.floor(Math.random()*prefix.length)] + rest[Math.floor(Math.random()*rest.length)];
    }

    let diceRotation = 0;
    function rollDice(element){
        document.getElementById('input-name').value = randomNick(); 
        diceRotation += 360;
        element.style.transform = `rotate(${diceRotation}deg)`;
    }

    // OBSŁUGA ZDARZEŃ SOCKET.IO
    socket.on('room_created', (code) => {
        currentRoomCode = code;
        document.getElementById('room-code-display').innerText = code;
        showScreen('screen-lobby');
    });

    socket.on('room_update', (room) => {
    
    currentRoomCode = room.code;
    document.getElementById('room-code-display').innerText = room.code;
    showScreen('screen-lobby');
    
    // Lista graczy z wyróżnieniem "Ciebie"
    const list = document.getElementById('players-list');
    list.innerHTML = room.players.map(p => {

        const isMe = p.id === socket.id; 
        const playerClass = isMe ? 'player-tag this-player' : 'player-tag';
        
        return `<span class="${playerClass}">${p.name}</span>`;
    }).join('');

        if (socket.id === room.host) {
            document.getElementById('host-controls').classList.remove('hidden');
            document.getElementById('waiting-msg').classList.add('hidden');
        }
    });

    socket.on('game_start', (data) => {
        screenLoad('screen-game');
        const display = document.getElementById('role-display');
        display.className = data.role === 'IMPOSTOR' ? 'role-impostor' : 'role-citizen';
        document.getElementById('role-name').innerText = data.role;
        document.getElementById('role-data').innerText = data.data;
        document.getElementById('category-display').innerText += data.gameCat;

        // Pokazujemy przycisk końca tylko hostowi (możesz to sprawdzić po socket.id)
        socket.emit('check_host', currentRoomCode);
    });

    socket.on('start_vote', (room) => {
        const screenVote = document.getElementById('vote-display');
        showScreen('screen-vote');
        let html = "";
        room.players.forEach(p => {html += `<div class="vote-tile" onclick='voteOn(this, ${room.impostorCount})'> ${p.name} </div>`;   
        screenVote.innerHTML = html;
        })
        if (socket.id === room.host) {
        document.getElementById('host-end-controls').classList.remove('hidden');
        }
    });

    socket.on('is_host', (isHost) => {
        if(isHost) document.getElementById('host-end-controls').classList.remove('hidden');
    });

    socket.on('game_over', (results) => {
        alert(`KONIEC! \nImpostor: ${results.impostorNames.join(', ')} \nHasło: ${results.word}`);
        location.reload(); 
    });

    socket.on('room_list', (roomsObject) => {
    const listContainer = document.getElementById('rooms-list');
    
    // Zamieniamy obiekt pokojów na tablicę
    const roomsArray = Object.values(roomsObject);
    
    // Czyścimy listę i budujemy nową
    let html = "";
    
    if (roomsArray.length === 0) {
        html = "<p id='no-rooms'>Brak aktywnych pokojów. Stwórz własny!</p>";
    } else {
        html = '<div style="margin: 15px 0; color: #999;">— LISTA POKOI —</div>';
        roomsArray.forEach(room => {
            // Wyświetlamy tylko pokoje, które jeszcze czekają na graczy
            if (room.status === 'waiting') {
                html += `
                <div class="room-item">
                    <button onclick="joinRoom('${room.code}')">Dołącz do pokoju: ${room.code} ${room.players.length} \u{1F464}</button>
                </div>`;
            }else{
                html += `
                <div class="room-item">
                    <button style='opacity: 0.5;'> Pokój zaczął grę ${room.players.length} \u{1F464}</button>
                </div>`;
            }
        });
    }
    
    listContainer.innerHTML = html;
    });

    socket.on('force_reload', (message) => {

    });

    socket.on('error', (msg) => {

            document.getElementById('error-display').style.opacity = 0;
            document.getElementById('error-display').style.top = '';
            document.getElementById('error-blur').style.filter = '';

const canvas = document.getElementById('rippleCanvas');
const ctx = canvas.getContext('2d');
let ripples = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Ripple {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 0;
        this.maxRadius = 200;
        this.opacity = 0.5; // Maksymalna przezroczystość fali
        this.speed = 1.2;    // Znacznie wolniejsza animacja
        this.thickness = 70; // Szerokość gradientu "pierścienia" fali
    }

    draw() {
        if (this.radius <= 0) return;

        ctx.save();
        
        // Tworzymy gradient radialny dla efektu płynnej "obręczy" wody
        // Gradient zaczyna się od środka fali i kończy na jej zewnętrznej krawędzi
        const gradient = ctx.createRadialGradient(
            this.x, this.y, Math.max(0, this.radius - this.thickness), 
            this.x, this.y, this.radius
        );

        // Płynne przejście koloru: przezroczysty -> biały -> przezroczysty
        const alpha = this.opacity * (1 - this.radius / this.maxRadius);
        gradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
        gradient.addColorStop(0.5, `rgba(255, 255, 255, ${alpha})`);
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

        ctx.beginPath();
        // Rysujemy pierścień fali
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.lineWidth = this.thickness;
        ctx.strokeStyle = gradient;
        ctx.stroke();
        ctx.closePath();
        
        ctx.restore();
    }

    update() {
        this.radius += this.speed;
        // Obliczamy wygasanie fali w stosunku do jej promienia
        this.opacity = 0.5 * (1 - this.radius / this.maxRadius);
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Usuwamy fale, które przekroczyły maxRadius lub stały się niewidoczne
    ripples = ripples.filter(r => r.opacity > 0.01 && r.radius < r.maxRadius);
    
    ripples.forEach(r => {
        r.update();
        r.draw();
    });
    
    requestAnimationFrame(animate);
}
animate();

window.addEventListener('mousedown', (e) => {
    const card = document.getElementById('card');
    if (card && card.contains(e.target)) return; 
    ripples.push(new Ripple(e.clientX, e.clientY));
});


    function screenLoad(screen){
        showScreen('screen-load');
        document.getElementById('loading-info').innerText = "Pobieranie wirusów...";
        progress = 0;
        currentWidth = 0;
        drawProgressBar(screen);
    }

const pCanvas = document.getElementById('progressCanvas');
const pCtx = pCanvas.getContext('2d');

// Parametry paska
let progress = 0; // Aktualny stan (0 do 100)
let targetProgress = 100; // Do ilu ma dobić
let currentWidth = 0; // Pomocnicza do płynnej animacji

// Kolory z Twoich zmiennych CSS
const colorSecondary = '#2ecc71';
const colorDark = '#363636'; 

function drawProgressBar() {
    // Dopasowanie rozdzielczości wewnętrznej canvasu
    pCanvas.width = pCanvas.clientWidth;
    pCanvas.height = pCanvas.clientHeight;

    const w = pCanvas.width;
    const h = pCanvas.height;
    const padding = 4; // Grubość obramowania

    // Czyścimy tło pod paskiem
    pCtx.clearRect(0, 0, w, h);

    // 1. Rysujemy obramowanie (Stroke)
    pCtx.strokeStyle = 'white';
    pCtx.lineWidth = padding;
    pCtx.strokeRect(padding/2, padding/2, w - padding, h - padding);

    // 2. Obliczamy płynne przejście szerokości (Linear Interpolation)
    // Zmienna 0.05 odpowiada za "gładkość" - im mniejsza, tym wolniej dobija
    let targetWidth = (w - (padding * 2)) * (progress / 100);
    currentWidth += (targetWidth - currentWidth) * 0.05;

    // 3. Rysujemy wypełnienie (Secondary)
    pCtx.fillStyle = colorSecondary;
    // Wypełnienie zaczyna się po wewnętrznej stronie ramki
    pCtx.fillRect(padding, padding, currentWidth, h - (padding * 2));

    // 4. Animacja pętli
    if (progress < targetProgress) {
        progress += 0.5; // Prędkość ładowania
        document.getElementById('loading-progress').innerText = "(" + Math.round(progress) + "%)"
    }else{
        setTimeout(() => {
            showScreen('screen-game'); 
        }, 500);
    }
    
    setTimeout(drawProgressBar, 20);
}
