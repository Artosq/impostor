<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostor Game v0.1🕵️‍♂️</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4757">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card" id="card">
        <div class="blood-container">
    <span class="drop"></span>
    <span class="drop"></span>
    <span class="drop"></span>
    <span class="drop"></span>
</div>
    <div id="error-display"></div>
    <div id="error-blur" style="transition: 0.8s ease-in-out;">
    <div class="logo"><img src='logo4.png' width="300px"></div>
    <div id="screen-login">
        <input type="text" id="input-name" placeholder="Twoje imię">
        <button class="btn-create" onclick="createRoom()">Stwórz Nowy Pokój</button>
        <div style="margin: 15px 0; color: #999;">— LUB —</div>
        <input type="text" id="input-code" placeholder="Kod pokoju">
        <button class="btn-join" onclick="joinRoom()">Dołącz do Pokoju</button>
        <div id="rooms-list"></div>
    </div>

    <div id="screen-lobby" class="hidden">
        <h3>Kod pokoju: <span id="room-code-display" style="color: var(--danger); text-shadow: 0 0 20px rgb(252, 81, 81);">----</span></h3>

        <div id="players-list"></div>
        
        <div id="host-controls" class="hidden">

            <p>Kategoria:</p>
            <div class="select-category">
                <button class="category-tile" id="Przedmioty" onclick="selectCategory('Przedmioty')">Inne</button>
                <button class="category-tile" id="Filmy" onclick="selectCategory('Filmy')">Filmy</button>
                <button class="category-tile" id="Gry" onclick="selectCategory('Gry')">Gry</button>
                <button class="category-tile" id="Kraje" onclick="selectCategory('Kraje')">Kraje</button>
            </div>
            <p>Liczba Impostorów:</p>
            <div class="select-category">
                <button class="impostor-tile" id="1" onclick="selectImpostors('1')">1</button>
                <button class="impostor-tile" id="2" onclick="selectImpostors('2')">2</button>
                <button class="impostor-tile" id="3" onclick="selectImpostors('3')">3</button>
                <button class="impostor-tile" id="4" onclick="selectImpostors('4')">4</button>
            </div>
            <button class="btn-start" onclick="startGame()">START GRY
                
            </button>
        </div>
        <p id="waiting-msg">Oczekiwanie na start przez hosta...</p>
    </div>

    <div id="screen-game" class="hidden">
        <h3>Kategoria: <span id="category-display" style="color: var(--danger); text-shadow: 0 0 20px rgb(252, 81, 81);"></span></h3>
        <div id="role-display" ontouchstart="this.style.filter = 'brightness(100%)'; " ontouchend="this.style.filter = 'brightness(0%)'" onmouseover="this.style.filter = 'brightness(100%)'; " onmouseout="this.style.filter = 'brightness(0%)'; ">
            <p>Twoja rola:</p>
            <h2 id="role-name">---</h2>
            <hr>
            <p>Twoja informacja:</p>
            <h1 id="role-data">---</h1>
        </div>
        <div id="host-vote-controls" class="hidden">
            <button class="btn-end" onclick="castVote()">Rozpocznij głosowanie</button>
        </div>
    </div>

        <div id="screen-vote" class="hidden">
        <h3><span id="category-display" style="color: var(--danger); text-shadow: 0 0 20px rgb(252, 81, 81);">Kto jest impostorem?</span></h3>
        <div id="vote-display">
        </div>
        <div id="host-end-controls" class="hidden">
            <button class="btn-end" onclick="endGame()">ZAKOŃCZ I POKAŻ WYNIKI</button>
        </div>
    </div>

    </div>
</div>

<script>
    const socket = io();
    let currentRoomCode = "";

    function showRole(){
        document.getElementById('role-display').style.filter = "blur('0px')";
    }

    // Funkcje pomocnicze do przełączania ekranów
    function showScreen(screenId) {
        ['screen-login', 'screen-lobby', 'screen-game','screen-vote'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(screenId).classList.remove('hidden');
    }

    // KOMUNIKACJA Z SERWEREM
    function createRoom() {
        let name = document.getElementById('input-name').value;
        if(!name)name = randomNick();
        socket.emit('create_room', { playerName: name });
    }

    function joinRoom(listCode) {
        let name = document.getElementById('input-name').value;

        if (listCode && listCode !== "") {
        code = listCode;
        }else{
            code = document.getElementById('input-code').value.toUpperCase();
        }

        //if (!name) return alert("Podaj imię i kod!");
        if(!name)name = randomNick();
        socket.emit('join_room', { playerName: name, roomCode: code });
    }

    let category;
    function selectCategory(id){
        document.querySelectorAll('.category-tile').forEach(tile => {
            tile.style.boxShadow = "";
            tile.style.scale = "1";
        })
        category = id;
        
        document.getElementById(id).style.boxShadow = "0px 0px 20px rgb(252, 81, 81)";
        document.getElementById(id).style.scale = "1.1";
    }
    selectCategory('Przedmioty');
    
    let impostors;
    function selectImpostors(id){
        document.querySelectorAll('.impostor-tile').forEach(tile => {
            tile.style.boxShadow = "";
            tile.style.scale = "1";
        })
        impostors = id;
        
        document.getElementById(id).style.boxShadow = "0px 0px 20px rgb(252, 81, 81)";
        document.getElementById(id).style.scale = "1.1";
    }
    selectImpostors('1');

    function startGame() {
        socket.emit('start_game', { roomCode: currentRoomCode, category, impostorCount: parseInt(impostors) });
    }

    function castVote() {
        if(confirm("Zacząć głosowanie?")) socket.emit('cast_vote', currentRoomCode);
    }

    function randomNick(){
        const prefix = ['Crazy','Fat','Skinny','Zesty','Stupid','Nasty','Slutty','Stupid','Dumb','Stinky','Cringe','Nigga','King','Tight','Clean','Edging']
        const rest = ['Nigger','Slut','Gay','Whore','Fucker','Hoe','Cunt','Killer','Pedo','Epstein','Putin','Faggot','Cock','Pussy','Balls','Dih','Puh']
        return prefix[Math.floor(Math.random()*prefix.length)] + rest[Math.floor(Math.random()*rest.length)];
    }

    function voteOn(selectedTile){
        document.querySelectorAll('.vote-tile').forEach(tile => {
            tile.classList.remove('selected');
        })
        selectedTile.classList.add('selected');
    }

    // OBSŁUGA ZDARZEŃ SOCKET.IO
    socket.on('room_created', (code) => {
        currentRoomCode = code;
        document.getElementById('room-code-display').innerText = code;
        showScreen('screen-lobby');
    });

    socket.on('room_update', (room) => {
        currentRoomCode = room.code; // upewnienie się dla dołączających
        document.getElementById('room-code-display').innerText = room.code;
        showScreen('screen-lobby');
        
        // Lista graczy
        const list = document.getElementById('players-list');
        list.innerHTML = room.players.map(p => `<span class="player-tag">${p.name}</span>`).join('');

        // Czy jesteś hostem?
        if (socket.id === room.host) {
            document.getElementById('host-controls').classList.remove('hidden');
            document.getElementById('waiting-msg').classList.add('hidden');
        }
    });

    socket.on('game_start', (data, room) => {
        showScreen('screen-game');
        const display = document.getElementById('role-display');
        display.className = data.role === 'IMPOSTOR' ? 'role-impostor' : 'role-citizen';
        document.getElementById('role-name').innerText = data.role;
        document.getElementById('role-data').innerText = data.data;
        document.getElementById('category-display').innerText += data.gameCat;

        // Pokazujemy przycisk końca tylko hostowi (możesz to sprawdzić po socket.id)
        if (socket.id === room.host) {
        document.getElementById('host-vote-controls').classList.remove('hidden');
        }
    });

    socket.on('is_host', (isHost) => {
        if(isHost) document.getElementById('host-vote-controls').classList.remove('hidden');
    });

    socket.on('start_vote', (room) => {
        const screenVote = document.getElementById('vote-display');
        showScreen('screen-vote');
        let html = "";
        room.players.forEach(p => {   html += `<div class="vote-tile" onclick='voteOn(this)'> ${p.name} </div>`;   
        screenVote.innerHTML = html;
        })
        if (socket.id === room.host) {
        document.getElementById('host-end-controls').classList.remove('hidden');
        }
    });

    socket.on('game_over', (results) => {
        alert(`KONIEC! \nImpostor: ${results.impostorNames.join(', ')} \nHasło: ${results.word}`);
        location.reload(); 
    });

    socket.on('room_list', (roomsObject) => {
    const listContainer = document.getElementById('rooms-list');
    
    // Zamieniamy obiekt pokojów na tablicę
    const roomsArray = Object.values(roomsObject);
    
    // Czyścimy listę i budujemy nową
    let html = "";
    
    if (roomsArray.length === 0) {
        html = "<p id='no-rooms'>Brak aktywnych pokojów. Stwórz własny!</p>";
    } else {
        html = '<div style="margin: 15px 0; color: #999;">— LISTA POKOI —</div>';
        roomsArray.forEach(room => {
            // Wyświetlamy tylko pokoje, które jeszcze czekają na graczy
            if (room.status === 'waiting') {
                html += `
                <div class="room-item">
                    <button onclick="joinRoom('${room.code}')">Dołącz do pokoju: ${room.code} ${room.players.length} \u{1F464}</button>
                </div>`;
            }
        });
    }
    
    listContainer.innerHTML = html;
    });

    socket.on('force_reload', (message) => {
    localStorage.removeItem('lastRoom'); // Czyścimy pamięć
    location.reload(); // Przeładowanie strony
    });

    socket.on('error', (msg) => {
        document.getElementById('error-display').innerText = msg;
        document.getElementById('error-display').style.opacity = '';
        document.getElementById('error-display').style.top = '5%';
        document.getElementById('error-blur').style.filter = 'saturate(0%)';
        setTimeout(() => {
            document.getElementById('error-display').style.opacity = 0;
            document.getElementById('error-display').style.top = '';
            document.getElementById('error-blur').style.filter = '';
        },3000)
    });
</script>
</body>
</html>
